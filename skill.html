<script>
(function(){
  var MD = "# Paper Reading \u2014 \u4e09\u5c42\u9605\u8bfb\u67b6\u6784\uff08\u601d\u60f3\u4f18\u5148 + \u8bc1\u636e\u53ef\u6838\u5bf9\uff09\n\n## Overview\n\nRead a research paper and produce a **distilled, human-readable, evidence-anchored** summary \u2014 NOT a translation or re-statement. Every summary has **three reading layers** (this is the core of the format; missing any layer is a defect):\n\n1. **\u2460 30 \u79d2\u5206\u8bca\u6761** `.snap` \u2014 \u75db\u70b9 / \u505a\u6cd5 / \u7ed3\u679c / \u8bfb\u6cd5 \u56db\u884c\uff0c\u8bc4\u7ea7\u524d\u7f6e\u3002\u8bfb\u8005\u4e0d\u6eda\u52a8\u5373\u53ef\u51b3\u5b9a\u8bfb\u4e0d\u8bfb\u3002\n2. **\u2461 90 \u79d2\u901f\u8bb0\u5c42** `#gist` \u2014 \u80cc\u666f\u4e3a\u4ec0\u4e48\u91cd\u8981 \u2192 \u4e00\u53e5\u8bdd\u601d\u60f3\uff08\u9f13\u52b1\u7c7b\u6bd4\uff09\u2192 \u903b\u8f91\u94fe \u2192 \u65b9\u6cd5\u9aa8\u67b6\uff08\u67b6\u6784\u56fe\u653e\u8fd9\uff0c\u56fe\u5148\u884c\uff09\u2192 \u6548\u679c=\u9a8c\u8bc1\uff08mini \u5bf9\u7167\u8868\uff09\u2192 \u653e\u8fdb\u77e5\u8bc6\u56fe\u8c31\uff08\u94fe\u5df2\u8bfb\u8bba\u6587\uff09\u2192 \u4e0e\u9879\u76ee\u76f8\u5173\u6027\u3002**\u9ed8\u8ba4\u8bfb\u5b8c\u5c31\u8d70\u7684\u7ec8\u70b9\u5c42\u3002**\n3. **\u2462 \u6df1\u8bfb\u5c42** `#core` \u2014 \u5206\u578b claims\uff08\u95ee\u9898/\u6d1e\u5bdf/\u65b9\u6cd5/\u7ed3\u679c/\u5c40\u9650\uff09\uff0c\u6bcf\u6761\u6302\"\u539f\u6587\u8bc1\u636e\u5b9a\u4f4d\u5668\"\uff1a**\u771f\u5b9e\u9875\u7801 + \u9010\u5b57\u82f1\u6587\u5f15\u6587\uff08Ctrl-F \u951a\u70b9\uff09+ \u4e2d\u6587\u8bd1\u6587**\uff0c\u5f15\u6587\u9ed8\u8ba4\u6298\u53e0\u3001\u89e3\u8bfb\u5e38\u9a7b\u3002\n\n**\u6838\u5fc3\u539f\u5219\uff1a\u901f\u8bb0\u5c42\u8ba9\u4eba\u8bfb\u61c2\u601d\u60f3\uff1b\u6df1\u8bfb\u5c42\u8ba9\u4eba\u6700\u77ed\u8def\u5f84\u6838\u5bf9\u539f\u6587\u3002\u901f\u8bb0\u5c42\u53ea\u8f6c\u8ff0\u3001\u4e0d\u5f15\u5165\u6df1\u8bfb\u5c42\u6ca1\u6709\u8bc1\u636e\u7684\u65b0\u4e8b\u5b9e\u3002**\n\nProduces **two HTML files per paper** (`summary.html` + `notes.html` concept glossary), plus `meta.json` feeding the **card-gallery index** (`~/Paper_reading/index.html`). A daily cron pushes new-paper recommendations. **Output is always HTML, never markdown.**\n\n## Output Location (REQUIRED)\n\nAll papers live under `~/Paper_reading/`, one folder per paper named after its **title**:\n\n```\n~/Paper_reading/\n\u251c\u2500\u2500 index.html                    # \u5361\u7247\u753b\u5eca\u7d22\u5f15\uff08\u5c01\u9762\u56fe+\u8bc4\u7ea7\u5f69\u5e26+Track\u5fbd\u7ae0+\u7b5b\u9009\uff09\uff0c\u81ea\u52a8\u91cd\u5efa\n\u251c\u2500\u2500 recommendations.html          # daily arXiv recommendation digest (cron-generated)\n\u251c\u2500\u2500 recommendations-curated.html  # \u7b56\u5c55\u7248\u63a8\u8350\uff08on-demand \u5168\u7f51\u626b\u63cf\u751f\u6210\uff09\n\u2514\u2500\u2500 <Sanitized-Paper-Title>/\n    \u251c\u2500\u2500 summary.html              # \u4e09\u5c42\u9605\u8bfb\u67b6\u6784 summary\n    \u251c\u2500\u2500 notes.html                # concept glossary (grows from user's questions)\n    \u251c\u2500\u2500 meta.json                 # machine-readable record \u2192 feeds index.html\n    \u251c\u2500\u2500 paper.pdf\n    \u2514\u2500\u2500 images/\n```\n\n**Folder name = paper title**, sanitized: spaces\u2192`-`, drop `:/\\?*\"<>|`, collapse repeats, cap \u224860 chars at a word boundary. **\u5efa\u65b0\u76ee\u5f55\u524d\u5148 `ls ~/Paper_reading` \u786e\u8ba4\u540c\u4e00\u8bba\u6587\u6ca1\u6709\u8bfb\u8fc7**\uff08\u66fe\u53d1\u751f\u540c\u7bc7\u8bba\u6587\u4e24\u4e2a\u76ee\u5f55\u7684\u4e8b\u6545\uff09\u3002\n\n## Conda / Python\n\nThis machine's conda is at **`~/anaconda3`** (NOT `~/miniconda3`). PDF text + figure extraction need it:\n```bash\nsource $HOME/anaconda3/etc/profile.d/conda.sh && conda activate base   # has pymupdf, pymupdf4llm, pillow\n```\nThe index + recommendation scripts are stdlib-only \u2192 run with `/usr/bin/python3`.\n\n## Workflow\n\n```dot\ndigraph paper_reading {\n    \"Acquire PDF\" -> \"Extract full TEXT (pymupdf, per-page)\";\n    \"Extract full TEXT (pymupdf, per-page)\" -> \"\u626b\u63cf\u5df2\u8bfb\u5e93 + \u5b9e\u65f6\u5f00\u6e90\u6838\u67e5\";\n    \"\u626b\u63cf\u5df2\u8bfb\u5e93 + \u5b9e\u65f6\u5f00\u6e90\u6838\u67e5\" -> \"Identify claims (\u5206\u578b) + \u901f\u8bb0\u5c42\u5185\u5bb9\";\n    \"Identify claims (\u5206\u578b) + \u901f\u8bb0\u5c42\u5185\u5bb9\" -> \"Extract key figures\";\n    \"Extract key figures\" -> \"Write summary.html (\u4e09\u5c42)\";\n    \"Write summary.html (\u4e09\u5c42)\" -> \"Concept checklist -> user multi-selects -> notes.html\";\n    \"Concept checklist -> user multi-selects -> notes.html\" -> \"Write meta.json\";\n    \"Write meta.json\" -> \"Rebuild gallery index\";\n    \"Rebuild gallery index\" -> \"Deploy: run deploy.sh (push + sync skill page)\";\n}\n```\n\n### Step 1 \u2014 Acquire PDF\n- arXiv URL \u2192 download `https://arxiv.org/pdf/XXXX.XXXXX`. Other URL \u2192 download; if not a PDF, WebFetch text.\n- `mkdir -p ~/Paper_reading/<Title>/images && curl -L -o ~/Paper_reading/<Title>/paper.pdf \"<url>\"` then `file` to verify.\n\n### Step 2 \u2014 Extract full TEXT for verbatim quotes (CRITICAL)\nReading the PDF as page-images is NOT enough; you cannot copy exact text from images. Dump per-page text so quotes are **byte-exact** and carry **real page numbers**:\n```bash\nsource $HOME/anaconda3/etc/profile.d/conda.sh && conda activate base && python3 - <<'PY'\nimport fitz, os\ndoc = fitz.open(os.path.expanduser(\"~/Paper_reading/<Title>/paper.pdf\"))\nwith open(os.path.expanduser(\"~/Paper_reading/<Title>/fulltext.txt\"),\"w\",encoding=\"utf-8\") as f:\n    for i in range(doc.page_count):\n        f.write(f\"\\n===== PAGE {i+1} =====\\n{doc[i].get_text()}\")\nPY\n```\nThen `grep -an` (must use `-a` \u2014 extraction often leaves NUL bytes) / Read `fulltext.txt` to pick exact sentences and their **PAGE marker** + section. Also Read the PDF pages (images) for understanding + figures.\n\n### Step 3 \u2014 \u626b\u63cf\u5df2\u8bfb\u5e93 + \u5b9e\u65f6\u5f00\u6e90\u6838\u67e5\uff08\u5199\u4f5c\u524d\u7684\u4e24\u4e2a\u5916\u90e8\u8f93\u5165\uff09\n1. **\u77e5\u8bc6\u56fe\u8c31\u5b9a\u4f4d**\uff1a`grep -h '\"title\"\\|\"one_liner\"' ~/Paper_reading/*/meta.json` \u62ff\u5230\u5168\u90e8\u5df2\u8bfb\u8bba\u6587\uff0c\u6311 2\u20134 \u7bc7\u6700\u8fd1\u90bb\uff0c\u786e\u5b9a\u4e09\u7c7b\u5173\u7cfb\uff1a**\u7ee7\u627f/\u6784\u5efa\u4e8e X \u00b7 \u5bf9\u7acb/\u7ade\u4e89\u8def\u7ebf Y \u00b7 \u4e92\u8865/\u4e0a\u4e0b\u6e38 Z**\uff0c\u5e76\u8bb0\u4e0b\u5b83\u4eec\u7684\u76ee\u5f55\u540d\u7528\u4e8e\u76f8\u5bf9\u94fe\u63a5 `../<dir>/summary.html`\u3002\n2. **\u5f00\u6e90\u72b6\u6001\u5b9e\u65f6\u6838\u67e5**\uff1aPDF \u91cc\u7684\u5f00\u6e90\u4fe1\u606f\u7ecf\u5e38\u8fc7\u65f6\u3002\u5fc5\u987b WebSearch/WebFetch \u5f53\u524d\u771f\u5b9e\u72b6\u6001\uff0c\u5217\u51fa**\u6240\u6709\u5df2\u53d1\u5e03\u7248\u672c/checkpoint/license**\uff08\u5982 GR00T N1/N1.5/N1.6/N1.7 \u6f14\u8fdb\uff09\uff0c\u8bb0\u5f55\u6838\u67e5\u65e5\u671f\u3002\u7edd\u4e0d\u80fd\u53ea\u51ed PDF \u5199\"\u95ed\u6e90\"\u3002\n\n### Step 4 \u2014 Identify claims\uff08\u5206\u578b\uff09+ \u901f\u8bb0\u5c42\u5185\u5bb9\nDistill, do not translate. Aim for **5\u20139 claims**\uff0c\u6bcf\u6761\u6807\u6ce8\u7c7b\u578b\uff1a**\u95ee\u9898 / \u6d1e\u5bdf / \u65b9\u6cd5 / \u7ed3\u679c / \u5c40\u9650**\uff08\u6e32\u67d3\u4e3a `k-problem/k-insight/k-method/k-result/k-limit`\uff09\uff0c\u5e76\u7ed9\u6bcf\u6761\u8d77 **6\u201312 \u5b57\u77ed\u6807\u9898**\uff08claim-title \u517c TOC \u6807\u7b7e\uff09\u30021\u20133 \u6548\u679c\u6570\u5b57\uff0c1 \u5f00\u6e90\u72b6\u6001\u3002Quality bar: \"what + why + how much\", not \"what was done\"\u3002\u540c\u65f6\u8d77\u8349\u901f\u8bb0\u5c42\u516d\u5757\u5185\u5bb9\uff08\u89c1 Step 6 \u7ed3\u6784\uff09\u3002\n\n### Step 5 \u2014 Extract key figures\nUse `pymupdf4llm.to_markdown(..., write_images=True, image_path=.../images, image_format=\"png\", dpi=200)` (NO `use_ocr` arg). Filter images <500\u00d7300, Read each, rename `figure_N_desc.png`. **`pymupdf4llm` often only extracts fragments of composite figures** \u2014 fall back to manual clipping with `fitz` + `page.search_for(\"Figure N:\")`: clip from top of page to just below the caption, render at dpi=180\u2013200. Delete micro-fragments. Capture 3\u201310 key figures\uff08**\u5148\u5b58\u6210 PNG \u5373\u53ef\uff1b`deploy.sh` \u4f1a\u8c03\u7528 `scripts/optimize_images.py` \u7edf\u4e00\u8f6c\u6210 WebP \u5e76\u6539\u5199\u5f15\u7528\uff0c\u4fdd\u6301\u7ebf\u4e0a\u8f7b\u91cf**\uff09\u3002**\u67b6\u6784\u603b\u56fe\u653e\u901f\u8bb0\u5c42\"\u65b9\u6cd5\u9aa8\u67b6\"\u6bb5\uff08\u56fe\u5148\u884c\uff09**\uff1b\u5176\u4f59\u56fe\u653e\u8fdb\u76f4\u63a5\u76f8\u5173\u7684 claim\u3002**\u56fe\u53f7/\u9875\u7801\u5fc5\u987b\u4e0e\u539f\u6587\u4e00\u81f4**\uff08\u66fe\u51fa\u73b0 Fig.5/Fig.6 \u9519\u6807\u4e8b\u6545\uff09\u3002\n\n### Step 6 \u2014 Write `summary.html`\uff08\u4e09\u5c42\u67b6\u6784\uff09\n**Copy the CSS + skeleton from `templates/example-summary.html` verbatim**, replace content. \u6a21\u677f\u9876\u90e8\u6ce8\u91ca\u5373\u7ed3\u6784\u8bf4\u660e\u3002Structure:\n\n1. **Hero\uff08\u8f7b\u91cf\uff09** \u2014 title\uff1bsubtitle **\u226440 \u5b57\u4e00\u53e5\u8bdd\u5b9a\u4f4d**\uff08\u65b9\u6cd5\u7efc\u8ff0\u4e0b\u6c89\u5230\u901f\u8bb0\u5c42\uff09\uff1bmeta-pills \u542b **\u8bc4\u7ea7 pill\uff08\u94fe #verdict\uff09** \u548c **\u9605\u8bfb\u65f6\u957f pill**\u3002\n2. **KPI \u6761** \u2014 \u6570\u5b57\u5361\u7684 desc **\u5fc5\u987b\u5e26\u5bf9\u7167\u951a**\uff08`60.5% vs \u03c0\u2080.\u2085 43.0%`\uff09\u5e76 `<a href=\"#cN\">` \u94fe\u5230\u63d0\u4f9b\u8bc1\u636e\u7684 claim\uff1b\u5f00\u6e90\u7b49\u72b6\u6001\u4e8b\u5b9e\u7528\u72b6\u6001\u5361\uff08os-tag\uff09\uff0c\u4e0d\u4f2a\u88c5\u6210\u5927\u6570\u5b57\u3002\n3. **\u2460 30 \u79d2\u5206\u8bca\u6761 `.snap`** \u2014 \u56db\u884c\uff1a\u75db\u70b9\uff08\u9886\u57df\u7f3a\u4ec0\u4e48\uff09/ \u505a\u6cd5\uff08\u4e00\u53e5\u3001\u22641 \u4e2a\u65b0\u672f\u8bed\uff09/ \u7ed3\u679c\uff08\u5fc5\u987b\u542b\u6570\u5b57+\u5bf9\u7167\uff09/ \u8bfb\u6cd5\uff08\u8bc4\u7ea7 badge + \u6309\u8bfb\u8005\u610f\u56fe\u5206\u6d41\u7684\u5efa\u8bae + \u26a1\u6700\u77ed\u7cbe\u8bfb\u8def\u5f84\uff1a1 \u56fe + 1 \u8868 + \u22641 \u8282\uff09\u3002\n4. **\u2461 \u901f\u8bb0\u5c42 `#gist`** \u2014 \u516d\u5757\uff1a\ud83e\udded\u80cc\u666f\u4e3a\u4ec0\u4e48\u91cd\u8981\uff082\u20133 \u53e5\uff1a\u6b64\u524d\u4e3b\u6d41\u8def\u7ebf\u3001\u4e3a\u4ec0\u4e48\u4e0d\u884c\uff09\uff1b\ud83d\udca1\u4e00\u53e5\u8bdd\u601d\u60f3\uff08\u9f13\u52b1\u7c7b\u6bd4\uff0c\u7981\u672a\u89e3\u91ca\u672f\u8bed\uff09\uff1b\ud83d\udd17\u903b\u8f91\u94fe\uff08`ol.chain` 3\u20136 \u6b65\uff09\uff1b\ud83e\udde9\u65b9\u6cd5\u9aa8\u67b6\uff08\u4e00\u884c\"\u8f93\u5165\u2192\u5904\u7406\u2192\u8f93\u51fa\"\u7ba1\u7ebf\u53e5 + 2\u20133 \u4e2a\u5173\u952e\u8bbe\u8ba1\u51b3\u7b56 + \u67b6\u6784\u56fe\uff09\uff1b\u2713\u6548\u679c=\u9a8c\u8bc1\uff08\u4e00\u53e5\u7ed3\u8bba + mini \u5bf9\u7167\u8868\uff1a\u672c\u6587\u884c `tr.winner`\u3001\u672b\u5217 \ud83d\udccd\u9875\u7801\uff09\uff1b\ud83d\uddfa\u653e\u8fdb\u77e5\u8bc6\u56fe\u8c31\uff08Step 3 \u7684 2\u20134 \u6761\u5173\u7cfb\uff0c\u76f8\u5bf9\u94fe\u63a5\uff09\uff1b\ud83c\udfaf\u4e0e\u9879\u76ee\u76f8\u5173\u6027\uff08Track A/B \u547d\u4e2d\u5224\u65ad + \u54ea\u8282\u53ef\u76f4\u63a5\u6284 + \u843d\u5730\u95e8\u69db\uff09\u3002\u4e4b\u540e\u653e `.layer-divider`\u3002\n5. **\u2462 \u6df1\u8bfb\u5c42 `#core`** \u2014 \u6807\u9898\u53f3\u4fa7\u5e26\u300c\u5c55\u5f00\u5168\u90e8\u8bc1\u636e\u300d\u6309\u94ae\uff1bclaims \u6309 `.claim-group` \u5206\u7ec4\uff08\u95ee\u9898\u4e0e\u6d1e\u5bdf / \u65b9\u6cd5 / \u7ed3\u679c\u4e0e\u8fb9\u754c\uff09\u3002**Claim \u6838\u5fc3\u6a21\u5f0f\uff1a**\n   ```html\n   <div class=\"claim k-method\" id=\"c3\">\n     <div class=\"claim-head\"><span class=\"cn\">3<\/span><span class=\"kicker\">\u65b9\u6cd5<\/span>\n       <h3 class=\"claim-title\">6\u201312 \u5b57\u77ed\u6807\u9898<\/h3><\/div>\n     <p class=\"claim-body\">\u4e00\u53e5 \u226440 \u5b57\u7ed3\u8bba\u5148\u884c\u7684\u4eba\u8bdd\u8bba\u70b9\uff08\u5e38\u89c4\u5b57\u91cd\uff09\u3002<\/p>\n     <div class=\"claim-how\">\u5b9e\u73b0\u7ec6\u8282/\u53c2\u6570/\u7ec4\u4ef6\u540d\u6536\u7eb3\u884c\uff08\u53ef\u7701\u7565\uff09\u3002<\/div>\n     <div class=\"evidence\">\n       <div class=\"ev-gloss\"><span class=\"ev-tag\">\u89e3\u8bfb<\/span><div>\u4e00\u53e5 so-what\uff08\u5e38\u9a7b\u53ef\u89c1\uff09<\/div><\/div>\n       <details class=\"ev-fold\">\n         <summary>\ud83d\udccd p.X \u00b7 \u00a7Y <span class=\"ev-hint\">\u2014 \u67e5\u9010\u5b57\u8bc1\u636e<\/span><\/summary>\n         <blockquote class=\"ev-quote\">verbatim English\uff0c<mark>\u627f\u91cd\u77ed\u8bed\u9ad8\u4eae<\/mark><\/blockquote>\n         <div class=\"ev-row\"><span class=\"ev-tag\">\u8bd1<\/span><div class=\"ev-trans\">\u8be5\u6bb5\u4e2d\u6587\u8bd1\u6587<\/div><\/div>\n       <\/details>\n     <\/div>\n   <\/div>\n   ```\n   \u4e00\u6761 claim \u53ef\u542b\u591a\u4e2a `.evidence`\u3002\u6700\u91cd\u8981\u7684 1\u20132 \u6761 claim \u52a0 `.key` \u7c7b\uff08\u2605 \u91d1\u8fb9\uff09\u3002\u51e1\u542b \u22653 \u4e2a\u5bf9\u6bd4\u6570\u5b57\u7684\u7ed3\u679c\uff0c\u7528 `.stat-row` \u80f6\u56ca\u884c\u6216 mini-table\uff0c**\u7981\u6b62\u5199\u6210\u4e2d\u6587\u957f\u53e5**\u3002\n6. **\u5f00\u6e90\u72b6\u6001\u5361** \u2014 \u6807\u9898\u5e26\u6838\u67e5\u65e5\u671f `\u5f00\u6e90\u72b6\u6001 \u00b7 \u5b9e\u65f6\u6838\u67e5\uff08\u622a\u81f3 YYYY-MM\uff09`\uff0c`.os-grid` + \u8bc1\u636e\u5757\u3002\n7. **\u6279\u5224 \u00b7 \u8bc4\u7ea7\u5361** \u2014 green callout\uff08\u503c\u5f97\u8bfb\u7684\u7406\u7531\uff09\u3001red callout\uff08\u4e3b\u8981\u4fdd\u7559\uff09\u3001rating badge\u3002\n8. **TOC\uff08\u4e24\u7ea7\uff09** \u2014 \u4e00\u7ea7\uff1a30\u79d2\u901f\u8bfb/\u901f\u8bb0\u5c42/\u6838\u5fc3\u89c2\u70b9/\u5f00\u6e90/\u6279\u5224\uff1b**\u6838\u5fc3\u89c2\u70b9\u4e0b\u5d4c\u5957\u6bcf\u6761 claim \u7684\u77ed\u6807\u9898\u951a\u70b9**\uff08`ul.toc-claims`\uff09\u3002\u6a21\u677f\u81ea\u5e26 scroll-spy \u4e0e\u5c55\u5f00\u6309\u94ae\u7684 JS\uff0c\u539f\u6837\u4fdd\u7559\u3002\n\n**Evidence rules (non-negotiable):**\n- `.ev-quote` must be **\u9010\u5b57 verbatim** from `fulltext.txt` \u2014 never paraphrase. It is the Ctrl-F anchor.\uff08\u6298\u53e0\u4e0d\u7834\u574f Ctrl-F\uff1aChromium \u547d\u4e2d\u95ed\u5408 `<details>` \u4f1a\u81ea\u52a8\u5c55\u5f00\uff1b\u53e6\u6709\u300c\u5c55\u5f00\u5168\u90e8\u8bc1\u636e\u300d\u6309\u94ae\u3002\uff09\n- \u5f15\u6587\u5185\u7528 `<mark>` \u9ad8\u4eae 5\u201310 \u4e2a\u627f\u91cd\u8bcd\uff0c**\u6807\u7b7e\u4e0d\u5f97\u5207\u65ad\u5355\u8bcd**\u3002\n- `.ev-loc`\uff08\u5373 summary \u884c\uff09must be the **real page number**\uff08from PAGE marker\uff09+ section\u3002\n- \u901f\u8bb0\u5c42/KPI/\u5206\u8bca\u6761\u7684\u6bcf\u4e2a\u4e8b\u5b9e\uff0c\u5fc5\u987b\u80fd\u5728\u67d0\u6761 claim \u7684\u8bc1\u636e\u4e2d\u627e\u5230\u5bf9\u5e94\u2014\u2014\u901f\u8bb0\u5c42\u662f\u8bc1\u636e\u5c42\u7684\u7d22\u5f15\uff0c\u4e0d\u662f\u65c1\u8def\u3002\n\n### Step 7 \u2014 \u5199\u4f5c\u89c4\u5219\uff08\u9762\u5411\u4eba\u7c7b\uff0c\u975e\u9762\u5411\u538b\u7f29\uff09\n\u7b80\u4f53\u4e2d\u6587\u884c\u6587\uff1b\u6280\u672f\u672f\u8bed\u4fdd\u7559\u82f1\u6587\uff1b\u516c\u5f0f/\u4ee3\u7801/\u5f15\u6587\u539f\u6837\u3002\u5728\u6b64\u4e4b\u4e0a\uff1a\n\n1. **claim-title** = 6\u201312 \u5b57\u77ed\u6807\u9898\uff1b**claim-body** = \u4e00\u53e5 \u226440 \u5b57\u3001\u7ed3\u8bba\u5148\u884c\u7684\u4eba\u8bdd\u8bba\u70b9\u2014\u2014\u5148\u8bf4\"\u505a\u4e86\u4ec0\u4e48/\u4e3a\u4ec0\u4e48\u806a\u660e\"\uff0c\u518d\u8bf4\u673a\u5236\u3002\n2. \u6bcf\u6761 claim \u6700\u591a\u5f15\u5165 **2 \u4e2a\u65b0\u672f\u8bed**\uff1b\u672f\u8bed\u9996\u73b0\u5fc5\u987b\u6709\u884c\u5185\u515c\u5e95\uff1a`<span class=\"term\" tabindex=\"0\" data-gloss=\"\u226425 \u5b57\u767d\u8bdd\u5b9a\u4e49\">FSQ<\/span>`\uff08hover \u663e\u793a\uff09\u3002**\u7981\u6b62\u62ec\u53f7\u5185\u518d\u5d4c\u5957\u672f\u8bed\u5806\u53e0**\uff1b\u89c4\u683c\u578b\u7ec6\u8282\uff08\u7ef4\u5ea6/\u91cf\u5316\u65b9\u5f0f/\u7ec4\u4ef6\u6e05\u5355\uff09\u4e00\u5f8b\u4e0b\u6c89\u5230 `.claim-how`\u3002\n3. **\u9f13\u52b1\u7c7b\u6bd4**\uff08\u597d\u4f8b\uff1a\"\u8f6f LoRA \u601d\u8def\"\u3001\"CE \u5f53\u9a7e\u6821\u6559\u7ec3\"\uff09\u3002\u4e00\u53e5\u8bdd\u601d\u60f3\u5fc5\u987b\u8ba9\u4e0d\u719f\u8be5\u5b50\u65b9\u5411\u7684\u5de5\u7a0b\u5e08\u542c\u5f97\u61c2\u3002\n4. **ev-gloss \u56de\u7b54 so-what**\uff08\u8fd9\u6761\u8bc1\u636e\u5bf9\u673a\u5668\u4eba\u5de5\u7a0b\u5e08\u610f\u5473\u7740\u4ec0\u4e48\uff09\uff0c\u7981\u6b62\u5f15\u5165\u8be5 claim \u672a\u89e3\u91ca\u7684\u65b0\u672f\u8bed\u3002\n5. **figcaption \u683c\u5f0f**\uff1a`<strong>Figure N (p.X)\uff1a<\/strong>\u4e00\u53e5\u8bdd\u5185\u5bb9\u3002<strong>\u770b\u70b9\uff1a<\/strong>\u8be5\u76ef\u54ea\u4e2a\u9762\u677f/\u66f2\u7ebf`\u3002\n6. \u81ea\u6d4b\uff1a\u906e\u4f4f\u8bc1\u636e\u53ea\u8bfb\u5206\u8bca\u6761+\u901f\u8bb0\u5c42\uff0c\u4e0d\u719f\u8be5\u5b50\u65b9\u5411\u7684\u5de5\u7a0b\u5e08\u5e94\u80fd\u5728 90 \u79d2\u540e\u5411\u540c\u4e8b\u8f6c\u8ff0\u8fd9\u7bc7\u8bba\u6587\u3002\n\n### Step 8 \u2014 Concept checklist interaction (REQUIRED)\nAfter the summary, **proactively ask** which concepts to explain. Use **AskUserQuestion (multiSelect)**: list key concepts/jargon, each with a one-line gloss.\n- Create `notes.html` from `templates/example-notes.html`\uff08empty skeleton with placeholder\uff09\u3002**If the user is unavailable**, leave it empty \u2014 do NOT pre-fill.\n- **\u6982\u5ff5\u5361\u672a\u5efa\u7acb\u65f6\u4e0d\u8981\u8f93\u51fa `note-link`**\uff08\u6b7b\u951a\u70b9\u4f24\u4fe1\u4efb\uff09\u2014\u2014\u7528 `.term[data-gloss]` \u884c\u5185\u91ca\u4e49\u515c\u5e95\u3002\u7528\u6237\u9009\u4e2d\u67d0\u6982\u5ff5\u3001\u6982\u5ff5\u5361\u843d\u5730\u540e\uff0c\u628a\u5bf9\u5e94 `.term` **\u5347\u7ea7**\u4e3a `<a class=\"note-link\" href=\"./notes.html#anchor\" data-gloss=\"...\">`\uff08\u4fdd\u7559 data-gloss \u53cc\u4fdd\u9669\uff09\u3002\n- Follow-up questions later \u2192 same on-demand growth. Never pre-fill concepts the user didn't pick.\n\n### Step 9 \u2014 Write `meta.json`\uff08\u4e0e\u753b\u5eca\u7d22\u5f15/CLAUDE.md \u540c\u6b65\u7684\u5b8c\u6574 schema\uff09\n```json\n{\n  \"title\": \"...\", \"title_cn\": \"...\",\n  \"field\": \"vla|humanoid|estimation|other\",\n  \"venue\": \"...\", \"date\": \"YYYY\",\n  \"one_liner\": \"\u4e00\u53e5\u8bdd(\u4e2d\u6587)\",\n  \"framework\": \"idea-first\",\n  \"idea\": \"\u4e00\u53e5\u8bdd\u601d\u60f3(\u4e2d\u6587)\",\n  \"logic_chain\": [\"\u4e3a\u4ec0\u4e48\u6210\u7acb\u7684 3-6 \u6b65\", \"...\"],\n  \"method_skeleton\": [\"\u5173\u952e\u8bbe\u8ba1\u51b3\u7b56\", \"...\"],\n  \"core_points\": [\"...\", \"...\"],\n  \"effects\": [\"\u5173\u952e\u6548\u679c/\u6570\u5b57(\u5e26\u5bf9\u7167)\", \"...\"],\n  \"relevance\": {\n    \"track_A_mobile_vla\": \"\u547d\u4e2d\u8bf4\u660e\uff08\u6216\u7559\u7a7a\uff09\",\n    \"track_B_legged\": \"\u547d\u4e2d\u8bf4\u660e\uff08\u6216\u7559\u7a7a\uff09\"\n  },\n  \"open_source\": \"code+weights|partial|none\",\n  \"open_source_detail\": \"\u7248\u672c/license/URL\uff08\u5217\u51fa\u6240\u6709\u5df2\u53d1\u5e03 checkpoint\uff09\",\n  \"open_source_checked\": \"YYYY-MM-DD\",\n  \"rating\": \"Breakthrough|Important|Valuable|Incremental\",\n  \"summary\": \"summary.html\"\n}\n```\n- `open_source` **\u5fc5\u987b\u662f\u5b57\u7b26\u4e32\u4e0d\u662f\u5bf9\u8c61**\uff1b`relevance` \u9a71\u52a8\u753b\u5eca\u7684 Track \u5fbd\u7ae0\u3002\n- **field \u5206\u7c7b\u7ea6\u5b9a\uff08\u89c1 `~/Paper_reading/CLAUDE.md`\uff09**\uff1aVLA / \u5177\u8eab\u64cd\u4f5c\u5927\u5bb6\u65cf\uff08\u542b\u4eba\u5f62 VLA\u3001\u79fb\u52a8\u64cd\u4f5c\u3001generalist policy\u3001\u5960\u57fa\u786c\u4ef6/\u7cfb\u7edf/\u57fa\u51c6\u5982 Mobile ALOHA\uff09**\u4e00\u5f8b `vla`**\uff1b\u53ea\u6709\u771f\u6b63\u53e6\u4e00\u65b9\u5411\u624d\u53e6\u7acb\uff08\u72b6\u6001\u4f30\u8ba1\u2192`estimation`\u3001\u7eaf locomotion/\u5e95\u5c42\u63a7\u5236\u2192`humanoid`\uff09\u3002\n\n### Step 10 \u2014 Rebuild the gallery index\n```bash\n/usr/bin/python3 ~/.claude/skills/paper-reading/scripts/build_index.py\n```\nScans every `<paper>/meta.json`, regenerates `~/Paper_reading/index.html` \u2014\u2014 **\u5361\u7247\u753b\u5eca**\uff08\u5c01\u9762\u81ea\u52a8\u53d6 `images/figure_*` \u4e2d overview/architecture/teaser \u7c7b\u56fe\u3001\u8bc4\u7ea7\u5f69\u5e26\u3001\u5f00\u6e90/Track \u5fbd\u7ae0\u3001\u641c\u7d22+\u7b5b\u9009\u3001\u84dd\u8272\u8c6a\u8f66 hero\uff0c\u8f66\u56fe\u5728 skill `assets/cars/` \u4f1a\u81ea\u52a8\u590d\u5236\uff09\u3002Idempotent\u3002\n- **Hero \u5185\u7f6e\u63a8\u8350\u5165\u53e3**\uff1aindex hero \u7684 `.hero-actions` \u6709\u4e24\u4e2a\u6309\u94ae \u2192 \ud83c\udfaf `recommendations-curated.html`\uff08\u7b56\u5c55\u7248\uff09\u548c \ud83d\udcf0 `recommendations.html`\uff08\u6bcf\u65e5 feed\uff09\u3002\u8fd9\u4e24\u4e2a\u94fe\u63a5\u5199\u5728 `build_index.py` \u7684 TEMPLATE \u91cc\uff0c\u91cd\u5efa\u65f6\u81ea\u52a8\u4fdd\u7559\u3002\n- `~/Paper_reading/build_gallery.py` \u73b0\u5728\u53ea\u662f\u4e00\u4e2a **shim**\uff08`runpy` \u8c03\u7528\u672c skill \u7684 `build_index.py`\uff09\uff0c\u5355\u4e00\u771f\u6e90\uff1b\u6539\u7248\u5f0f\u53ea\u6539 `build_index.py`\u3002\n\n### Step 11 \u2014 Desktop app\uff08\u56fe\u6807 + \u542f\u52a8\u5668\uff0c\u4e00\u6b21\u6027\uff09\n\u628a index \u505a\u6210\u684c\u9762\u5e94\u7528\uff08GNOME app grid \u53ef\u641c + \u684c\u9762\u56fe\u6807 + Chrome `--app` \u65e0\u8fb9\u6846\u72ec\u7acb\u7a97\u53e3\uff09\uff1a\n```bash\nsource $HOME/anaconda3/etc/profile.d/conda.sh && conda activate base \\\n  && python3 ~/.claude/skills/paper-reading/scripts/install_app.py\n```\n- \u751f\u6210\u84dd\u8272\u753b\u5eca\u56fe\u6807\uff08PIL\uff0c\u591a\u5c3a\u5bf8\u88c5\u8fdb hicolor \u4e3b\u9898\uff0cmaster \u5b58 skill `assets/icon/`\uff09\uff0c\u5199 `~/.local/share/applications/paper-reading.desktop`\uff08app grid\uff09+ `~/Desktop/paper-reading.desktop`\uff08\u5df2 chmod+x \u5e76 `gio set metadata::trusted true`\uff09\u3002\n- \u542f\u52a8\u5668\u7528\u9ed8\u8ba4\u6d4f\u89c8\u5668 `--app=file://\u2026/index.html`\uff08Chrome \u4f18\u5148\uff1b\u65e0 Chrome \u9000\u56de `xdg-open`\uff09\u3002\u6539\u56fe\u6807/\u6587\u6848\u540e\u91cd\u8dd1\u6b64\u811a\u672c\u5373\u53ef\u3002idempotent\u3002\n\n## Paper Recommendations (push + on-demand)\n\n**Daily push (already configured):** OS crontab runs `scripts/fetch_recommendations.py` at 08:57 \u2192 one arXiv `cs.RO` query \u2192 buckets into the user's fields \u2192 refreshes `~/Paper_reading/recommendations.html` + `notify-send`. Verify with `crontab -l`; reinstall if removed.\n\n**On-demand (\"\u63a8\u8350\u8bba\u6587\"):** run `fetch_recommendations.py` for a fresh pull, then do a **curated** pass \u2014 WebSearch/WebFetch arXiv + \u4f1a\u8bae\u83b7\u5956 + **\u5de5\u4e1a\u754c\u6280\u672f\u62a5\u544a**\uff08Figure/Google/NVIDIA/PI/\u667a\u5143/Galaxea/X Square/Unitree/\u94f6\u6cb3\u901a\u7528\u7b49\u2014\u2014\u6f0f\u6389\u91cd\u8981\u5de5\u4e1a\u6a21\u578b\u4e0d\u53ef\u63a5\u53d7\uff09\uff0cdedup against `~/Paper_reading/*/meta.json` titles\uff0c\u6838\u5b9e\u6bcf\u7bc7\u5b58\u5728\u6027/\u94fe\u63a5/\u5f00\u6e90\u72b6\u6001\uff0c\u5199\u5165 `~/Paper_reading/recommendations-curated.html`\uff08index hero \u7684 \ud83c\udfaf \u7b56\u5c55\u63a8\u8350\u6309\u94ae\u76f4\u8fbe\uff09\u5e76\u5728\u5bf9\u8bdd\u91cc\u7ed9\u6392\u5e8f\u77ed\u540d\u5355\uff08why-relevant + new vs. classic\uff09\u3002Offer to deep-read any pick.\n\n**Interest profile** lives in Claude memory: `[[paper-reading-interests]]`\uff08Track A: VLA/\u79fb\u52a8\u64cd\u4f5c\uff1bTrack B: \u4eba\u5f62 locomotion/\u63a7\u5236/RL/sim2real/\u72b6\u6001\u4f30\u8ba1\uff09\u3002Keep `FIELDS` in `fetch_recommendations.py` in sync. arXiv rate-limits rapid queries (HTTP 429) \u2014 the script makes **one** request; never fan out 3+ arXiv API calls.\n\n## Web \u90e8\u7f72 (GitHub Pages)\n\n\u8bba\u6587\u5e93\u662f\u7eaf\u9759\u6001\u7ad9\uff0c\u53d1\u5e03\u5230 GitHub Pages \u540e\u4efb\u610f\u7535\u8111\u53ef\u8bbf\u95ee\uff1b**\u65b9\u6cd5\u8bba tab\uff08`skill.html`\uff09\u6bcf\u6b21\u90e8\u7f72\u4ece SKILL.md \u91cd\u65b0\u6e32\u67d3\uff0c\u6c38\u8fdc\u540c\u6b65\u6700\u65b0**\u3002\n\n> **\u6536\u5c3e\u94c1\u5f8b\uff1a\u6bcf\u8bfb\u5b8c\u4e00\u7bc7\u8bba\u6587\u3001\u6216\u6539\u52a8\u4e86 SKILL.md / \u6a21\u677f / \u811a\u672c\uff0c\u6700\u540e\u4e00\u6b65\u5fc5\u987b\u8fd0\u884c `~/Paper_reading/deploy.sh`** \u2014\u2014 \u5b83\u4f1a\u91cd\u5efa index\u3001\u4ece SKILL.md \u91cd\u6e32\u67d3 skill.html\u3001commit & push\uff08\u8d70 SSH\uff09\u3002\u8fd9\u6837\u7ebf\u4e0a\u5e93\u4e0e\u65b9\u6cd5\u8bba\u9875\u59cb\u7ec8\u4e0e\u672c\u5730\u540c\u6b65\u3002\n\n- `~/Paper_reading/.gitignore` \u6392\u9664 `*.pdf` / `fulltext.txt` / `CLAUDE.md` / `*.py` \u7b49\uff08\u7248\u6743\u4e0e\u5185\u90e8\u6587\u4ef6\u4e0d\u53d1\u5e03\uff0c\u53ea\u53d1\u7efc\u8ff0/\u7b14\u8bb0/\u56fe\uff0c\u7ea6 80M\uff09\u3002\n- `scripts/build_site.py` \u628a SKILL.md \u6e32\u67d3\u6210 `~/Paper_reading/skill.html`\uff08marked.js\uff0c\u81ea\u5e26 TOC + scroll-spy\uff09\uff1bindex hero \u6709\u300c\ud83d\udcd6 \u65b9\u6cd5\u8bba\u300d\u6309\u94ae\u3002\n- **\u9996\u6b21\u53d1\u5e03**\uff08\u4e00\u6b21\u6027\uff0c\u9700\u5148 `gh auth login`\uff09\uff1a`bash ~/Paper_reading/publish_github.sh` \u2014\u2014 \u5efa\u4ed3 + \u63a8\u9001 + \u5f00 Pages + \u6253\u5370 URL\u3002\n- **\u65e5\u5e38\u66f4\u65b0**\uff1a\u8bfb\u5b8c\u65b0\u8bba\u6587 / \u6539\u4e86 SKILL.md \u540e\u8dd1 `~/Paper_reading/deploy.sh` \u2014\u2014 \u91cd\u5efa index + skill.html\uff0ccommit & push\uff0c\u7ea6 1 \u5206\u949f\u540e\u7ebf\u4e0a\u5237\u65b0\u3002\n- gh \u88c5\u5728 `~/.local/bin/gh`\uff08\u65e0\u9700 sudo\uff09\u3002\n- **\u672c\u673a\u7f51\u7edc\u4f1a\u91cd\u7f6e git-over-HTTPS \u5230 github.com**\uff0c\u4ed3\u5e93\u5df2\u914d\u7f6e\u8d70 **SSH\uff08`ssh://git@ssh.github.com:443/...`\uff0c\u7528 `~/.ssh/id_rsa`\uff09**\uff1b`deploy.sh` \u7684 `git push` \u56e0\u6b64\u8d70 SSH\u3002\u4e0d\u8981\u6539\u56de HTTPS \u8fdc\u7a0b\u3002\n\n## Common Mistakes\n\n| Mistake | Correction |\n|---|---|\n| **Re-stating / translating the whole paper** | Distill to typed claims; each with verbatim-quote anchors. |\n| **\u7f3a\u901f\u8bb0\u5c42/\u5206\u8bca\u6761\uff0c\u76f4\u63a5\u8fdb\u8bc1\u636e\u5899** | \u4e09\u5c42\u7f3a\u4e00\u4e0d\u53ef\u2014\u2014\u8fd9\u662f\"\u4e0d\u9002\u5408\u4eba\u7c7b\u9605\u8bfb\"\u53cd\u9988\u7684\u6839\u56e0\u3002 |\n| **claim \u5199\u6210\u538b\u7f29\u9ed1\u8bdd**\uff08\u62ec\u53f7\u5d4c\u5957 4-5 \u4e2a\u672a\u89e3\u91ca\u672f\u8bed\uff09 | \u7ed3\u8bba\u5148\u884c\u4eba\u8bdd \u226440 \u5b57\uff1b\u22642 \u65b0\u672f\u8bed + `data-gloss` \u884c\u5185\u6ce8\uff1b\u7ec6\u8282\u8fdb `.claim-how`\u3002 |\n| \u901f\u8bb0\u5c42\u5f15\u5165\u6df1\u8bfb\u5c42\u6ca1\u6709\u8bc1\u636e\u7684\u65b0\u4e8b\u5b9e | \u901f\u8bb0\u5c42\u53ea\u8f6c\u8ff0\uff1b\u6bcf\u4e2a\u4e8b\u5b9e\u53ef\u56de\u6eaf\u5230\u67d0\u6761 claim \u7684\u5f15\u6587\u3002 |\n| Paraphrasing the `.ev-quote` | Must be **byte-exact** from `fulltext.txt`. |\n| Guessing page numbers / \u56fe\u53f7\u9875\u7801\u9519\u6807 | Use `===== PAGE N =====` markers\uff1b\u56fe\u53f7\u4e0e\u539f\u6587\u6838\u5bf9\u3002 |\n| Reading PDF only as images | Always also dump text with `fitz`. |\n| `grep` reports \"binary file matches\" | Use `grep -a`\uff08NUL bytes\uff09\u3002 |\n| \u5d4c\u5165 `pymupdf4llm` \u788e\u7247\u56fe | \u624b\u52a8 `fitz` \u6574\u56fe\u88c1\u526a\uff1b\u5220\u9664\u788e\u7247\u3002 |\n| **\u6982\u5ff5\u5361\u672a\u5efa\u5c31\u8f93\u51fa note-link\uff08\u6b7b\u951a\u70b9\uff09** | \u5148\u7528 `.term[data-gloss]`\uff1b\u6982\u5ff5\u843d\u5730\u540e\u518d\u5347\u7ea7\u3002 |\n| Pre-filling notes.html concepts | Concepts are added ONLY when the user selects/asks. |\n| KPI/\u7ed3\u679c\u6570\u5b57\u65e0\u5bf9\u7167\u951a | `60.5% vs \u03c0\u2080.\u2085 43.0%` \u683c\u5f0f\uff1bKPI \u5361\u94fe\u5230\u8bc1\u636e claim\u3002 |\n| \u22653 \u4e2a\u5bf9\u6bd4\u6570\u5b57\u5199\u6210\u957f\u53e5 | `.stat-row` \u80f6\u56ca\u6216 mini-table\uff08`tr.winner` + \ud83d\udccd\u9875\u7801\u5217\uff09\u3002 |\n| **\u5f00\u6e90\u72b6\u6001\u53ea\u51ed PDF \u5224\u65ad** | \u5fc5\u987b WebSearch \u5b9e\u65f6\u6838\u67e5 + \u5217\u51fa\u5168\u90e8\u7248\u672c + \u6807\u6ce8\u6838\u67e5\u65e5\u671f\u3002 |\n| \u628a VLA \u5bb6\u65cf\u8bba\u6587\u62c6\u8fdb manipulation/humanoid | \u6309 CLAUDE.md\uff1a\u4e00\u5f8b `field=\"vla\"`\u3002 |\n| \u540c\u4e00\u8bba\u6587\u91cd\u590d\u5efa\u76ee\u5f55 | \u8bfb\u4e4b\u524d `ls ~/Paper_reading` \u67e5\u91cd\u3002 |\n| Putting output in `~/Papers` or temp | Always `~/Paper_reading/<Title>/`. |\n| Forgetting `meta.json` / index rebuild | Without them the paper won't appear in the gallery. |\n| Using `~/miniconda3` | This machine uses `~/anaconda3`. |\n| 3+ separate arXiv API queries | Triggers HTTP 429. One query, bucket locally. |\n| Outputting markdown | Always HTML from the templates. |\n";
  var doc = document.getElementById('doc');
  function slug(t){return t.toLowerCase().replace(/[^\w一-龥]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60);}
  if(window.marked){
    marked.setOptions({gfm:true,breaks:false,headerIds:false,mangle:false});
    doc.innerHTML = marked.parse(MD);
  } else {
    doc.innerHTML = '<pre style="white-space:pre-wrap">'+MD.replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];})+'</pre>';
    return;
  }
  // build TOC + heading anchors from rendered h2/h3
  var toc = document.getElementById('toc'), used = {};
  doc.querySelectorAll('h2,h3').forEach(function(h){
    var id = slug(h.textContent)||'s'; while(used[id]){id+='-x';} used[id]=1; h.id=id;
    var a = document.createElement('a');
    a.href = '#'+id; a.textContent = h.textContent;
    a.className = h.tagName === 'H3' ? 'h3' : '';
    toc.appendChild(a);
  });
  if('IntersectionObserver' in window){
    var links = [].slice.call(toc.querySelectorAll('a'));
    var spy = new IntersectionObserver(function(es){es.forEach(function(e){
      if(e.isIntersecting) links.forEach(function(a){a.classList.toggle('on', a.getAttribute('href')==='#'+e.target.id);});
    });},{rootMargin:'-8% 0px -82% 0px'});
    doc.querySelectorAll('h2,h3').forEach(function(h){spy.observe(h);});
  }
})();
